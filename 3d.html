<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D IP形象 - 贝贝 (AI互动版)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f4f8;
            /* 柔和的背景色 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 1.2rem;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 10;
        }

        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #8898aa;
            pointer-events: none;
            user-select: none;
            z-index: 5;
        }

        /* 聊天界面样式 */
        #chat-interface {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 450px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            z-index: 20;
            overflow: hidden;
            border: 2px solid #fff;
            transition: transform 0.3s ease;
        }

        #chat-header {
            background: linear-gradient(135deg, #FFCce6, #BFEFFF);
            padding: 15px;
            color: #555;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chat-header span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 14px;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background-color: #BFEFFF;
            color: #333;
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            align-self: flex-start;
            background-color: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .message.loading {
            align-self: flex-start;
            background-color: #f9f9f9;
            color: #999;
            font-style: italic;
            font-size: 12px;
        }

        #chat-input-area {
            padding: 10px;
            background-color: #fff;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: #FFCce6;
        }

        #send-btn {
            background: linear-gradient(135deg, #FFCce6, #FFB7C5);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        #send-btn:hover {
            transform: scale(1.1);
        }

        #send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 滚动条美化 */
        #chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        #chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        /* 返回按钮 */
        #back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            color: #333;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        #back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 1);
        }

        /* 玩法面板 */
        #play-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 20px;
            z-index: 50;
            border: 2px solid rgba(255, 255, 255, 0.3);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        #play-panel h3 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .play-section {
            margin-bottom: 20px;
        }

        .play-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .play-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .play-btn {
            padding: 10px 12px;
            background: linear-gradient(135deg, #FFCce6, #BFEFFF);
            border: none;
            border-radius: 12px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 204, 230, 0.4);
        }

        .play-btn:active {
            transform: translateY(0);
        }

        .play-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .toggle-switch label {
            font-size: 14px;
            color: #333;
            cursor: pointer;
            flex: 1;
        }

        .toggle-switch input[type="checkbox"] {
            width: 44px;
            height: 24px;
            appearance: none;
            background: #ccc;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #FFCce6, #BFEFFF);
        }

        .toggle-switch input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-switch input[type="checkbox"]:checked::before {
            transform: translateX(20px);
        }

        .background-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .bg-option {
            aspect-ratio: 1;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bg-option:hover {
            transform: scale(1.05);
            border-color: #FFCce6;
        }

        .bg-option.active {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 768px) {
            #play-panel {
                width: 240px;
                top: 70px;
                left: 10px;
                max-height: calc(100vh - 150px);
            }

            #back-button {
                top: 10px;
                left: 10px;
                padding: 10px 16px;
                font-size: 12px;
            }

            .play-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 引入 OrbitControls - 使用更可靠的CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- 引入 GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- 引入配置文件 -->
    <script src="config.js"></script>
    <script>
        // 确保Three.js和OrbitControls已加载
        function checkLibraries() {
            if (typeof THREE === 'undefined') {
                console.error('Three.js未加载！');
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.innerHTML = '❌ Three.js库加载失败，请检查网络连接后刷新页面';
                }
                return false;
            }

            // 等待OrbitControls加载（可能需要一点时间）
            if (typeof THREE.OrbitControls === 'undefined') {
                console.warn('OrbitControls未加载，尝试备用方案...');
                // 尝试使用unpkg CDN
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js';
                script.onload = function () {
                    console.log('OrbitControls从备用CDN加载成功');
                };
                script.onerror = function () {
                    console.error('OrbitControls加载失败！');
                    const loadingEl = document.getElementById('loading');
                    if (loadingEl) {
                        loadingEl.innerHTML = '❌ OrbitControls加载失败，请检查网络连接后刷新页面';
                    }
                };
                document.head.appendChild(script);
                return false;
            }
            return true;
        }

        // 页面加载完成后检查
        window.addEventListener('load', function () {
            setTimeout(function () {
                if (!checkLibraries()) {
                    console.error('库加载检查失败');
                }
            }, 100);
        });
    </script>
</head>

<body>

    <div id="loading">正在加载可爱的小熊...</div>
    <div id="canvas-container"></div>
    <div class="controls-info">拖动旋转 • 滚动缩放</div>

    <!-- 返回按钮 -->
    <a href="ip.html" id="back-button">
        <span>←</span>
        <span>返回IP形象</span>
    </a>

    <!-- 玩法面板 -->
    <div id="play-panel">
        <h3>🎮 互动玩法</h3>

        <div class="play-section">

        <div class="play-section">

        <div class="play-section">

    <!-- 聊天界面 -->
    <div id="chat-interface">
        <div id="chat-header">
            <span>🐻 贝贝 (Beibei)</span>
            <span style="font-size: 12px; opacity: 0.7;">AI Powered ✨</span>
        </div>
        <div id="chat-messages">

    <script>
        // --- Gemini API Configuration ---
        // 从配置文件读取 API Key
        const apiKey = CONFIG && CONFIG.GEMINI_API_KEY ? CONFIG.GEMINI_API_KEY : "";

        // 检查 API Key 是否配置
        if (!apiKey) {
            console.warn("⚠️ Gemini API Key 未配置！请在 config.js 中设置 GEMINI_API_KEY");
        }

        // 等待页面加载完成
        window.addEventListener('load', init);

        let scene, camera, renderer, controls;
        let bearGroup, wingsGroup, headGroup, skirtGroup;
        let clock = new THREE.Clock();
        let mixer; // 用于播放模型动画

        // 动画状态
        let isJumping = false;
        let jumpTime = 0;
        let currentAction = null;
        let actionTime = 0;
        let autoRotateEnabled = true;
        let wingAnimationEnabled = true;
        let breathingEnabled = true;
        let leftArm, rightArm, leftEye, rightEye;
        let bodyGroup;
        let leftEyeOriginalY, rightEyeOriginalY;
        let isHoveringOnBear = false;
        let raycaster, mouse;

        // 颜色定义（基于 new.html 的精确颜色）
        const colors = {
            fur: 0xEAC8A8,         // Base fur
            earInner: 0xC89F6C,    // #C89F6C
            cheek: 0xFFB6C1,       // #FFB6C1
            eye: 0x3A2F25,         // #3A2F25
            nose: 0x2E2A26,        // #2E2A26
            shellLeft: 0xF4C6E8,   // #F4C6E8
            shellRight: 0xB7E8F7,  // #B7E8F7
            pearl: 0xFFFFFF,       // #FFFFFF
            dressTop: new THREE.Color(0xF4C6E8),    // #F4C6E8
            dressBottom: new THREE.Color(0xB7E8F7), // #B7E8F7
            dressOutline: 0x5DA9BC,                 // #5DA9BC
            bowCenter: 0xF4C6E8,   // #F4C6E8
            bowOutline: 0x5DA9BC,  // #5DA9BC
            pawPad: 0xC89F6C       // #C89F6C
        };

        function init() {
            // 检查Three.js是否已加载
            if (typeof THREE === 'undefined') {
                console.error('Three.js未加载！');
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.innerHTML = '❌ Three.js库加载失败，请刷新页面重试';
                }
                return;
            }

            // 1. 场景设置
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xeef2f5);
            scene.fog = new THREE.Fog(0xeef2f5, 10, 50);

            // 2. 相机设置
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 8);

            // 3. 渲染器设置
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding; // 关键：GLTF 需要 sRGB 编码，否则由于线性颜色空间会导致发暗

            const canvas = renderer.domElement;
            const container = document.getElementById('canvas-container');
            if (!container) {
                console.error('canvas-container元素未找到！');
                document.getElementById('loading').innerHTML = '❌ 页面元素加载失败，请刷新页面';
                return;
            }
            container.appendChild(canvas);

            // 4. 灯光设置（增强光线以照亮 GLTF 模型）
            const ambientLight = new THREE.AmbientLight(0xffffff, 1); // 提高基础环境光
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5); // 添加半球光以获得更好的漫反射
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0); // 调低主光源，避免头顶反光过曝
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0xE6E6FA, 0.7); // 提高补光
            fillLight.position.set(-5, 5, -5);
            scene.add(fillLight);

            // 5. 创建角色
            try {
                createCharacter();
            } catch (error) {
                console.error('创建角色时出错:', error);
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.innerHTML = '❌ 创建3D模型失败: ' + error.message;
                }
                return;
            }

            // 6. 控制器
            if (typeof THREE.OrbitControls === 'undefined') {
                console.error('OrbitControls未加载！');
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.innerHTML = '❌ OrbitControls加载失败，请刷新页面重试';
                }
                return;
            }
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 3;
            controls.maxDistance = 15;
            controls.target.set(0, 0, 0);

            // 6.5. 初始化鼠标悬停检测
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            initHoverDetection();

            // 获取加载文字元素，等模型加载完毕再隐藏
            const loadingEl = document.getElementById('loading');
            if (loadingEl) {
                loadingEl.innerHTML = '正在加载可爱的小熊模型...';
            }

            // 7. 开始动画循环
            animate();

            // 窗口大小调整
            window.addEventListener('resize', onWindowResize);

            // 初始化聊天功能
            initChat();

            // 初始化玩法功能
            initPlayFeatures();
        }

        function createCharacter() {
            bearGroup = new THREE.Group();
            scene.add(bearGroup);

            // 为了防止原有基于代码生成的手脚和翅膀动画报错，这里创建空的占位节点
            headGroup = new THREE.Group();
            wingsGroup = new THREE.Group();
            leftArm = new THREE.Group();
            rightArm = new THREE.Group();
            leftEye = new THREE.Group();
            rightEye = new THREE.Group();
            wingsGroup.add(new THREE.Group()); // wingsGroup.children[0]
            wingsGroup.add(new THREE.Group()); // wingsGroup.children[1]
            bearGroup.add(headGroup, wingsGroup, leftArm, rightArm, leftEye, rightEye);

            leftEyeOriginalY = 0;
            rightEyeOriginalY = 0;

            const loader = new THREE.GLTFLoader();
            const loadingEl = document.getElementById('loading');

            loader.load('3D/teddy+bear+3d+model111.glb', function (gltf) {
                const model = gltf.scene;

                // 调整模型的缩放，使其大小合适
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim > 0) {
                    const scale = 2.5 / maxDim; // 尽量还原之前2单位的高度
                    model.scale.set(scale, scale, scale);
                }

                // 将模型调整到居中并站在地上
                const center = box.getCenter(new THREE.Vector3());
                model.position.x = -center.x * model.scale.x;
                model.position.z = -center.z * model.scale.z;
                model.position.y = -box.min.y * model.scale.y;

                // 启用阴影
                model.traverse(function (child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                bearGroup.add(model);

                // 播放自带动画
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                }

                // 模型加载完成后隐藏加载提示
                if (loadingEl) {
                    loadingEl.style.opacity = 0;
                }
            }, function (xhr) {
                if (loadingEl) {
                    if (xhr.lengthComputable && xhr.total > 0) {
                        const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                        loadingEl.innerHTML = '正在加载可爱的小熊... ' + percentComplete + '%';
                    } else {
                        const mbLoaded = (xhr.loaded / (1024 * 1024)).toFixed(1);
                        loadingEl.innerHTML = '正在加载可爱的小熊... 已加载 ' + mbLoaded + ' MB';
                    }
                }
            }, function (error) {
                console.error('加载模型失败:', error);
                if (loadingEl) {
                    loadingEl.innerHTML = '❌ 加载3D模型失败';
                    loadingEl.style.opacity = 1;
                }
            });

            bearGroup.position.y = 0.4;
        }


        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }


        // --- Chat UI & Logic ---

        function initChat() {
            const sendBtn = document.getElementById('send-btn');
            const userInput = document.getElementById('user-input');

            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const message = inputEl.value.trim();
            if (!message) return;

            // 1. 显示用户消息
            addMessageToChat(message, 'user');
            inputEl.value = '';

            // 2. 显示加载状态
            const loadingMsgId = addMessageToChat('贝贝正在思考...', 'loading');
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            // 3. 准备 Prompt
            const systemPrompt = "你叫贝贝(Beibei)，一只可爱的3D小熊，有仙女翅膀。你住在数字世界里。你性格活泼、友善，喜欢吃蜂蜜、甜点，还喜欢亮晶晶的宝石。你的回答要简短、可爱，多用颜文字(emoji)。如果是中文对话请用中文回复。不要长篇大论。";

            try {
                // 4. 调用 Gemini API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const data = await response.json();

                // 移除 loading 消息
                const messagesDiv = document.getElementById('chat-messages');
                const loadingMsg = document.getElementById(loadingMsgId);
                if (loadingMsg) messagesDiv.removeChild(loadingMsg);

                if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    addMessageToChat(reply, 'bot');

                    // 5. 触发3D动作：跳跃表示开心
                    triggerJump();
                } else {
                    addMessageToChat('贝贝好像走神了... (API Error)', 'bot');
                }

            } catch (error) {
                console.error(error);
                const messagesDiv = document.getElementById('chat-messages');
                const loadingMsg = document.getElementById(loadingMsgId);
                if (loadingMsg) messagesDiv.removeChild(loadingMsg);
                addMessageToChat('贝贝连不上网啦... 🌐', 'bot');
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        function addMessageToChat(text, type) {
            const messagesDiv = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerText = text;

            if (type === 'loading') {
                const id = 'loading-' + Date.now();
                msgDiv.id = id;
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                return id;
            }

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return null;
        }

        function triggerJump() {
            // 如果正在执行其他动作，先停止
            if (currentAction && currentAction !== 'jump') {
                currentAction = null;
            }
            // 如果已经在跳跃，不重复触发
            if (!isJumping) {
                isJumping = true;
                jumpTime = 0;
            }
        }

        // --- 鼠标悬停检测 ---
        function initHoverDetection() {
            const canvas = renderer.domElement;

            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseleave', () => {
                isHoveringOnBear = false;
                canvas.style.cursor = 'default';
            });
        }

        function onMouseMove(event) {
            const canvas = renderer.domElement;

            // 检查鼠标是否在UI元素上
            const playPanel = document.getElementById('play-panel');
            const chatInterface = document.getElementById('chat-interface');
            const backButton = document.getElementById('back-button');

            const rect = canvas.getBoundingClientRect();
            const x = event.clientX;
            const y = event.clientY;

            // 检查是否在UI元素上
            const playPanelRect = playPanel.getBoundingClientRect();
            const chatRect = chatInterface.getBoundingClientRect();
            const backRect = backButton.getBoundingClientRect();

            if (x >= playPanelRect.left && x <= playPanelRect.right &&
                y >= playPanelRect.top && y <= playPanelRect.bottom) {
                isHoveringOnBear = false;
                return;
            }

            if (x >= chatRect.left && x <= chatRect.right &&
                y >= chatRect.top && y <= chatRect.bottom) {
                isHoveringOnBear = false;
                return;
            }

            if (x >= backRect.left && x <= backRect.right &&
                y >= backRect.top && y <= backRect.bottom) {
                isHoveringOnBear = false;
                return;
            }

            // 计算鼠标在canvas中的归一化坐标
            mouse.x = ((x - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((y - rect.top) / rect.height) * 2 + 1;

            // 使用Raycaster检测是否与贝贝模型相交
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(bearGroup, true);

            isHoveringOnBear = intersects.length > 0;

            // 改变鼠标样式
            canvas.style.cursor = isHoveringOnBear ? 'pointer' : 'default';
        }

        // --- 玩法功能 ---

        function initPlayFeatures() {
            // 动作按钮
            document.querySelectorAll('[data-action]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const action = btn.getAttribute('data-action');
                    triggerAction(action);
                    // 更新按钮状态
                    document.querySelectorAll('[data-action]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    setTimeout(() => btn.classList.remove('active'), 2000);
                });
            });

            // 表情按钮
            document.querySelectorAll('[data-expression]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const expression = btn.getAttribute('data-expression');
                    changeExpression(expression);
                    document.querySelectorAll('[data-expression]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });

            // 背景切换
            document.querySelectorAll('.bg-option').forEach(option => {
                option.addEventListener('click', () => {
                    const bg = option.getAttribute('data-bg');
                    changeBackground(bg);
                    document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('active'));
                    option.classList.add('active');
                });
            });

            // 设置开关
            document.getElementById('auto-rotate').addEventListener('change', (e) => {
                autoRotateEnabled = e.target.checked;
            });

            document.getElementById('wing-animation').addEventListener('change', (e) => {
                wingAnimationEnabled = e.target.checked;
            });

            document.getElementById('breathing-effect').addEventListener('change', (e) => {
                breathingEnabled = e.target.checked;
            });

            // 拍照功能
            document.getElementById('screenshot-btn').addEventListener('click', takeScreenshot);
        }

        function triggerAction(action) {
            currentAction = action;
            actionTime = 0;

            switch (action) {
                case 'dance':
                    // 跳舞：左右摇摆 + 旋转
                    break;
                case 'wave':
                    // 挥手：手臂摆动
                    break;
                case 'spin':
                    // 转圈：快速旋转
                    break;
                case 'jump':
                    triggerJump();
                    // 跳跃不需要 currentAction，立即清除以便跳跃动画能执行
                    currentAction = null;
                    break;
                case 'bow':
                    // 鞠躬：头部和身体前倾
                    break;
                case 'fly':
                    // 飞行：翅膀大幅扇动 + 上升
                    break;
            }
        }

        function changeExpression(expression) {
            // 通过调整眼睛和嘴巴来改变表情
            if (!leftEye || !rightEye) return;

            // 重置位置和缩放
            leftEye.position.y = leftEyeOriginalY;
            rightEye.position.y = rightEyeOriginalY;
            leftEye.scale.set(1, 1, 0.5);
            rightEye.scale.set(1, 1, 0.5);

            switch (expression) {
                case 'happy':
                    // 眼睛稍微眯起
                    leftEye.scale.y = 0.7;
                    rightEye.scale.y = 0.7;
                    break;
                case 'sad':
                    // 眼睛向下
                    leftEye.position.y = leftEyeOriginalY - 0.1;
                    rightEye.position.y = rightEyeOriginalY - 0.1;
                    break;
                case 'surprised':
                    // 眼睛放大
                    leftEye.scale.set(1.3, 1.3, 0.5);
                    rightEye.scale.set(1.3, 1.3, 0.5);
                    break;
                case 'wink':
                    // 眨眼：一只眼睛闭上
                    rightEye.scale.y = 0.1;
                    setTimeout(() => {
                        rightEye.scale.y = 1;
                    }, 300);
                    break;
            }
        }

        function changeBackground(bg) {
            const backgrounds = {
                default: { color: 0xeef2f5, fog: 0xeef2f5 },
                sunset: { color: 0xff9a9e, fog: 0xfecfef },
                ocean: { color: 0x667eea, fog: 0x764ba2 },
                forest: { color: 0x11998e, fog: 0x38ef7d },
                space: { color: 0x0c0c0c, fog: 0x1a1a2e },
                rainbow: { color: 0x667eea, fog: 0x4facfe }
            };

            if (backgrounds[bg]) {
                scene.background = new THREE.Color(backgrounds[bg].color);
                scene.fog = new THREE.Fog(backgrounds[bg].fog, 10, 50);
            }
        }

        function takeScreenshot() {
            renderer.render(scene, camera);
            const dataURL = renderer.domElement.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `beibei-${Date.now()}.png`;
            link.href = dataURL;
            link.click();

            // 显示提示
            const btn = document.getElementById('screenshot-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ 已保存！';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        }

        // animate函数 - 支持所有动画和动作
        function animate() {
            requestAnimationFrame(animate);

            // 获取时间间隔并更新动画状态
            const delta = clock.getDelta();
            const time = clock.elapsedTime;

            if (mixer) {
                mixer.update(delta);
            }

            // 动作执行
            if (currentAction) {
                actionTime += 0.05;

                switch (currentAction) {
                    case 'dance':
                        bearGroup.rotation.y = Math.sin(actionTime * 3) * 0.3;
                        bearGroup.position.x = Math.sin(actionTime * 3) * 0.2;
                        if (actionTime > 2) {
                            currentAction = null;
                            bearGroup.rotation.y = 0;
                            bearGroup.position.x = 0;
                            bearGroup.position.y = 0.4;
                        }
                        break;
                    case 'wave':
                        if (leftArm && rightArm) {
                            leftArm.rotation.z = Math.PI / 6 + Math.sin(actionTime * 5) * 0.5;
                            rightArm.rotation.z = -Math.PI / 6 - Math.sin(actionTime * 5) * 0.5;
                        }
                        if (actionTime > 1.5) {
                            currentAction = null;
                            if (leftArm && rightArm) {
                                leftArm.rotation.z = Math.PI / 6;
                                rightArm.rotation.z = -Math.PI / 6;
                            }
                        }
                        break;
                    case 'spin':
                        bearGroup.rotation.y += 0.1;
                        if (actionTime > 2) {
                            currentAction = null;
                        }
                        break;
                    case 'bow':
                        headGroup.rotation.x = Math.sin(actionTime * 2) * 0.3;
                        bearGroup.position.y = 0.4 - Math.abs(Math.sin(actionTime * 2)) * 0.2;
                        if (actionTime > 1.5) {
                            currentAction = null;
                            headGroup.rotation.x = 0;
                            bearGroup.position.y = 0.4;
                        }
                        break;
                    case 'fly':
                        bearGroup.position.y = 0.4 + Math.sin(actionTime * 4) * 0.8;
                        if (wingsGroup) {
                            wingsGroup.children[0].rotation.y = -Math.PI / 6 + Math.sin(actionTime * 20) * 0.5;
                            wingsGroup.children[1].rotation.y = Math.PI / 6 - Math.sin(actionTime * 20) * 0.5;
                        }
                        if (actionTime > 2) {
                            currentAction = null;
                            bearGroup.position.y = 0.4;
                        }
                        break;
                }
            }

            // 基础待机动画
            // 跳跃动画优先级最高，即使有其他动作也可以跳跃
            if (isJumping) {
                // 跳跃逻辑
                jumpTime += 0.1;
                bearGroup.position.y = 0.4 + Math.sin(jumpTime) * 0.5;
                if (jumpTime > Math.PI) {
                    isJumping = false;
                    jumpTime = 0;
                    bearGroup.position.y = 0.4; // 复位
                }
            } else if (!currentAction) {
                // 只有在没有动作且不在跳跃时才执行呼吸动画
                if (breathingEnabled) {
                    // 呼吸浮动
                    bearGroup.position.y = Math.sin(time * 2) * 0.1 + 0.4;
                } else {
                    bearGroup.position.y = 0.4;
                }
            }

            // 翅膀扇动
            if (wingsGroup && wingAnimationEnabled && !currentAction) {
                const speed = isJumping ? 15 : 8; // 跳跃时扇动更快
                wingsGroup.children[0].rotation.y = -Math.PI / 6 + Math.sin(time * speed) * 0.2;
                wingsGroup.children[1].rotation.y = Math.PI / 6 - Math.sin(time * speed) * 0.2;
            }

            // 头部轻微摆动
            if (headGroup && !currentAction) {
                headGroup.rotation.z = Math.sin(time * 1.5) * 0.05;
                headGroup.rotation.y = Math.sin(time * 1) * 0.05;
            }

            // 自动旋转（当鼠标不在贝贝身上时）
            if (autoRotateEnabled && !currentAction && !isJumping && !isHoveringOnBear) {
                bearGroup.rotation.y += 0.005;
            }

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
