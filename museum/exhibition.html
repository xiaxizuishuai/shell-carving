<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字藏品展览馆</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        /* Base Reset */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden; /* we want to focus on the frame */
            background: #0b1120;
        }

        /* Background Image Layer */
        .exhibition-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: url('26a6930b8d9de54570099b4f3e7a5c0b.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* NavBar Layer */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(11, 17, 32, 0.4);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .navbar-logo {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }
        .navbar-links a {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.95rem;
            margin-left: 36px;
            transition: color 0.3s, text-shadow 0.3s;
            position: relative;
        }
        .navbar-links a:hover {
            color: #b3e5fc;
            text-shadow: 0 0 10px rgba(179, 229, 252, 0.8);
        }
        .navbar-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ffccbc, #b3e5fc);
            transition: width 0.3s ease;
        }
        .navbar-links a:hover::after {
            width: 100%;
        }

        /* Animated Title Layer */
        .title-container {
            position: absolute;
            top: 12%; 
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .animated-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: transparent;
            background: linear-gradient(120deg, #ffccbc 0%, #b3e5fc 30%, #e1f5fe 50%, #b3e5fc 70%, #ffccbc 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradient-flow 6s linear infinite, glow-pulse 3s max-height ease-in-out infinite alternate;
            letter-spacing: 5px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.4); /* subtle dark shadow behind the glow */
            /* Add some floating effect */
            transform: translateY(0px);
            animation: gradient-flow 6s linear infinite, float 4s ease-in-out infinite;
        }
        @keyframes gradient-flow {
            to { background-position: 200% center; }
        }
        @keyframes float {
            0% { transform: translateY(0px); filter: drop-shadow(0 0 10px rgba(179, 229, 252, 0.4)); }
            50% { transform: translateY(-8px); filter: drop-shadow(0 0 25px rgba(255, 204, 188, 0.6)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 0 10px rgba(179, 229, 252, 0.4)); }
        }

        /* 3D Model Container Layer */
        .model-container {
            position: absolute;
            top: 55%; /* Centered vertically, offset depending on background image's frame location */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45vw; /* 45% of viewport width */
            height: 45vw;
            max-width: 600px;
            max-height: 600px;
            z-index: 5;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            outline: none;
            background-color: transparent;
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.3)); /* give model some depth against background */
        }

        /* Info Panel */
        .info-panel {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 32px;
            border-radius: 20px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            animation: fade-in 0.5s ease;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .model-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 1px;
            color: #e1f5fe;
        }
        .model-desc {
            font-size: 0.85rem;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }

        /* Controls Layer */
        .controls {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }
        .btn-glass {
            padding: 12px 32px;
            border-radius: 50px;
            background: rgba(240, 248, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2), inset 0 0 10px rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 130px;
        }
        .btn-glass:hover {
            background: rgba(240, 248, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(179, 229, 252, 0.3), inset 0 0 15px rgba(255,255,255,0.1);
            color: #e1f5fe;
        }
        .btn-glass:active {
            transform: translateY(0);
        }
        .icon {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div class="exhibition-bg"></div>

    <!-- Navigation Layer -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">贝壳🐚展览馆</a>
        <div class="navbar-links">
            <a href="index.html">展品页面</a>
            <a href="exhibition.html" style="color: #b3e5fc; text-shadow: 0 0 10px rgba(179, 229, 252, 0.6);">数字藏品</a>
        </div>
    </nav>

    <!-- Animated Title Layer -->
    <div class="title-container">
        <h1 class="animated-title">数字藏品展览馆</h1>
    </div>

    <!-- 3D Model Layer -->
    <div class="model-container">
        <model-viewer 
            id="exhibitionViewer"
            src="" 
            alt="3D Digital Collectible" 
            auto-rotate 
            rotation-per-second="30deg"
            camera-controls
            shadow-intensity="1"
            environment-image="neutral"
            exposure="1.0"
            max-camera-orbit="auto 90deg auto"> <!-- Prevents looking from below the floor -->
        </model-viewer>
    </div>

    <!-- Model Status Info -->
    <div class="info-panel" id="infoPanel">
        <div class="model-name" id="modelName">加载中...</div>
        <div class="model-desc">可拖拽旋转 · 滚动缩放</div>
    </div>

    <!-- Controls Layer -->
    <div class="controls">
        <button class="btn-glass" onclick="prevModel()">
            <span class="icon">◄</span> 上一件
        </button>
        <button class="btn-glass" onclick="toggleAutoRotate()" id="toggleAutoRotateBtn">
            <span class="icon">⏸</span> 暂停旋转
        </button>
        <button class="btn-glass" onclick="nextModel()">
            下一件 <span class="icon">►</span>
        </button>
    </div>

    <!-- Logic -->
    <script>
        const models = [
            {
                src: '../3D/藏品/huakuang-v1.glb',
                name: '古雅画框'
            },
            {
                src: '../3D/藏品/lanziornamentalshell3dmodel-v1.glb',
                name: '蓝紫雕花贝壳'
            },
            {
                src: '../3D/藏品/lotusflower3dmodel-v1.glb',
                name: '玉雕莲花'
            },
            {
                src: '../3D/藏品/ornatebirdjewelry3dmodel-v1.glb',
                name: '华丽飞鸟珠宝'
            }
        ];

        let currentIndex = 0;
        const viewer = document.getElementById('exhibitionViewer');
        const modelNameEl = document.getElementById('modelName');
        const rotateBtn = document.getElementById('toggleAutoRotateBtn');
        const infoPanel = document.getElementById('infoPanel');

        function loadModel(index) {
            // Circular array logic
            if (index < 0) index = models.length - 1;
            if (index >= models.length) index = 0;
            currentIndex = index;

            const model = models[currentIndex];
            // Encode the URI to handle Chinese characters in the path correctly
            viewer.src = encodeURI(model.src);
            modelNameEl.textContent = model.name;
            
            // Re-trigger fade in animation for info panel
            infoPanel.style.animation = 'none';
            void infoPanel.offsetWidth; // Trigger reflow
            infoPanel.style.animation = 'fade-in 0.5s ease';
        }

        function prevModel() {
            loadModel(currentIndex - 1);
        }

        function nextModel() {
            loadModel(currentIndex + 1);
        }

        function toggleAutoRotate() {
            if (viewer.hasAttribute('auto-rotate')) {
                viewer.removeAttribute('auto-rotate');
                rotateBtn.innerHTML = '<span class="icon">▶</span> 开始旋转';
            } else {
                viewer.setAttribute('auto-rotate', '');
                rotateBtn.innerHTML = '<span class="icon">⏸</span> 暂停旋转';
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            loadModel(0);
        });
    </script>
</body>
</html>
